<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proceed Payment</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  </head>
  <body class="bg-gray-50 dark:bg-gray-950 min-h-screen text-gray-800 dark:text-gray-100">
    
    <div class="max-w-6xl mx-auto my-10 p-4">
      
      <div class="mb-6">
        <a href="./cart.html" class="inline-flex items-center gap-2 text-sm font-medium text-[#2D99AE] hover:opacity-80 transition-opacity">
          <i class="fa-solid fa-arrow-left"></i> Quay lại giỏ hàng
        </a>
      </div>

      <div class="mb-8">
        <h1 class="text-3xl font-black text-gray-900 dark:text-white flex items-center gap-3">
          <i class="fa-solid fa-credit-card text-[#2D99AE]"></i> Tiến Hành Thanh Toán
        </h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Vui lòng kiểm tra lại đơn hàng và điền thông tin nhận hàng bên dưới.</p>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
        
        <div class="lg:col-span-5 space-y-6">
          <div class="bg-white dark:bg-gray-900 p-6 rounded-2xl border border-gray-100 dark:border-gray-800 shadow-xl">
            <h2 class="text-lg font-bold text-gray-900 dark:text-white mb-4 flex items-center gap-2">
              <i class="fa-solid fa-location-dot text-[#2D99AE]"></i> Thông tin giao hàng
            </h2>
            
            <div class="space-y-4">
              <div>
                <label for="cus_name" class="block mb-1.5 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Họ và tên</label>
                <input type="text" id="cus_name" required class="block w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#2D99AE]/20 focus:border-[#2D99AE]">
              </div>
              <div>
                <label for="cus_phone" class="block mb-1.5 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Số điện thoại</label>
                <input type="tel" id="cus_phone" required class="block w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#2D99AE]/20 focus:border-[#2D99AE]">
              </div>
              <div>
                <label for="cus_address" class="block mb-1.5 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Địa chỉ nhận hàng</label>
                <input type="text" id="cus_address" required class="block w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#2D99AE]/20 focus:border-[#2D99AE]">
              </div>
            </div>
          </div>

          <div class="bg-white dark:bg-gray-900 p-6 rounded-2xl border border-gray-100 dark:border-gray-800 shadow-xl">
            <h2 class="text-lg font-bold text-gray-900 dark:text-white mb-4 flex items-center gap-2">
              <i class="fa-solid fa-wallet text-[#2D99AE]"></i> Phương thức thanh toán
            </h2>
            
            <div class="space-y-3">
              <label class="flex items-center gap-3 p-3.5 border border-[#2D99AE] bg-[#2D99AE]/5 rounded-xl cursor-pointer transition-all">
                <input type="radio" name="payment_method" value="cod" checked class="w-4 h-4 text-[#2D99AE] focus:ring-[#2D99AE]">
                <div>
                  <p class="text-sm font-semibold text-gray-900 dark:text-white">Thanh toán khi nhận hàng (COD)</p>
                  <p class="text-xs text-gray-400">Trả tiền mặt trực tiếp cho shipper khi nhận máy</p>
                </div>
              </label>

              <label class="flex items-center gap-3 p-3.5 border border-gray-200 dark:border-gray-700 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800/40 cursor-pointer transition-all">
                <input type="radio" name="payment_method" value="transfer" class="w-4 h-4 text-[#2D99AE] focus:ring-[#2D99AE]">
                <div>
                  <p class="text-sm font-semibold text-gray-900 dark:text-white">Chuyển khoản ngân hàng / Quét QR</p>
                  <p class="text-xs text-gray-400">Nhận thông tin tài khoản sau khi xác nhận</p>
                </div>
              </label>
            </div>
          </div>
        </div>

        <div class="lg:col-span-7 bg-white dark:bg-gray-900 rounded-2xl border border-gray-100 dark:border-gray-800 shadow-xl overflow-hidden">
          <div class="bg-slate-50 dark:bg-gray-800/50 px-6 py-4 border-b border-gray-100 dark:border-gray-800">
            <h2 class="text-md font-bold text-gray-900 dark:text-white flex items-center gap-2">
              <i class="fa-solid fa-basket-shopping text-[#2D99AE]"></i> Tóm tắt đơn hàng
            </h2>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse whitespace-nowrap">
              <thead>
                <tr class="bg-[#2D99AE]/10 dark:bg-gray-800 text-slate-700 dark:text-gray-300 font-semibold text-xs uppercase tracking-wider border-b border-gray-100 dark:border-gray-800">
                  <th class="py-3 px-6 text-center" colspan="2">Sản phẩm</th>
                  <th class="py-3 px-4 text-center">SL</th>
                  <th class="py-3 px-4 text-center">Giá SP (VNĐ)</th>
                  <th class="py-3 px-6 text-right">Tổng cộng</th>
                </tr>
              </thead>
              <tbody id="payment" class="text-slate-600 dark:text-gray-300 text-sm divide-y divide-gray-100 dark:divide-gray-800">
                </tbody>
            </table>
          </div>

          <div class="p-6 bg-slate-50 dark:bg-gray-800/30 border-t border-gray-100 dark:border-gray-800 space-y-4">
            <div class="flex justify-between items-center text-sm">
              <span class="text-gray-500">Tạm tính đơn hàng:</span>
              <span id="subtotalPrice" class="font-medium">0đ</span>
            </div>
            <div class="flex justify-between items-center text-sm">
              <span class="text-gray-500">Phí vận chuyển:</span>
              <span class="font-medium text-[#05C776]">Miễn phí</span>
            </div>
            <hr class="border-gray-200 dark:border-gray-800">
            <div class="flex justify-between items-center">
              <span class="text-base font-bold text-gray-900 dark:text-white">Tổng tiền cần thanh toán:</span>
              <span id="totalPayPrice" class="text-2xl font-black text-[#2D99AE]">0đ</span>
            </div>

            <button id="confiPay" class="w-full mt-2 bg-[#05C776] hover:bg-[#04b269] text-white font-bold px-6 py-3.5 rounded-xl shadow-lg shadow-[#05C776]/25 transition-all active:scale-98 cursor-pointer flex items-center justify-center gap-2 text-md">
              <i class="fa-solid fa-circle-check"></i> Xác nhận thanh toán
            </button>
          </div>
        </div>

      </div>
    </div>

    <script src="./../models/Pay.js" type="module"></script>
  </body>
</html>
