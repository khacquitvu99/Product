<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.css"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-gray-50 dark:bg-gray-950 min-h-screen text-gray-800 dark:text-gray-100"
  >
    <!-- title -->
    <div class="max-w-7xl mx-auto my-10 p-4">
      <div class="mb-6 flex justify-between items-center">
        <a
          href="../index.html"
          class="inline-flex items-center gap-2 text-sm font-medium text-[#2D99AE] hover:opacity-80 transition-opacity"
        >
          <i class="fa-solid fa-arrow-left"></i> Quay lại trang chủ
        </a>
      </div>

      <div
        class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-100 dark:border-gray-800 shadow-xl overflow-hidden"
      >
        <div
          class="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-slate-50 dark:bg-gray-800/50 p-6 gap-4 border-b border-gray-100 dark:border-gray-800"
        >
          <div>
            <h1
              class="text-2xl font-black text-gray-900 dark:text-white flex items-center gap-2"
            >
              <i class="fa-solid fa-list-check text-[#2D99AE]"></i> Quản Lý Sản
              Phẩm
            </h1>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
              Thêm, sửa, xóa hoặc lọc thông tin thiết bị trong hệ thống
            </p>
          </div>

          <div class="flex items-center gap-3 w-full sm:w-auto">
            <select
              id="search"
              class="block w-full sm:w-44 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 text-sm font-medium rounded-xl border border-gray-300 dark:border-gray-600 p-2.5 focus:border-[#2D99AE] focus:ring-2 focus:ring-[#2D99AE]/20 transition-all cursor-pointer"
            >
              <option value="all">-- Tất cả hãng --</option>
              <option value="samsung">Samsung</option>
              <option value="iphone">iPhone</option>
            </select>

            <button
              id="btn__addnew"
              data-modal-target="crud-modal"
              data-modal-toggle="crud-modal"
              class="whitespace-nowrap bg-[#05C776] hover:bg-[#04b269] text-white font-semibold px-4 py-2.5 rounded-xl shadow-lg shadow-[#05C776]/10 transition-all active:scale-98 cursor-pointer flex items-center gap-1.5 text-sm"
            >
              <i class="fa-solid fa-plus"></i> Thêm sản phẩm
            </button>
          </div>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse whitespace-nowrap">
            <thead>
              <tr
                class="bg-[#2D99AE]/10 dark:bg-gray-800 text-slate-700 dark:text-gray-200 font-semibold text-sm tracking-wider border-b border-gray-100 dark:border-gray-800"
              >
                <th class="py-4 px-6">ID</th>
                <th class="py-4 px-6">Hình ảnh</th>
                <th class="py-4 px-6">Tên sản phẩm</th>
                <th class="py-4 px-6">Màn hình</th>
                <th class="py-4 px-6">Cam trước</th>
                <th class="py-4 px-6">Cam sau</th>
                <th class="py-4 px-6">Hãng</th>
                <th class="py-4 px-6">Giá bán</th>
                <th class="py-4 px-6">Mô tả</th>
                <th class="py-4 px-6 text-center" colspan="2">Hành động</th>
              </tr>
            </thead>
            <tbody
              id="manadisplay"
              class="text-slate-600 dark:text-gray-300 text-sm divide-y divide-gray-100 dark:divide-gray-800"
            ></tbody>
          </table>
        </div>
      </div>
    </div>
    <!-- Modal -->
    <div
      id="crud-modal"
      tabindex="-1"
      aria-hidden="true"
      class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full"
    >
      <div class="relative p-4 w-full max-w-md max-h-full">
        <div
          class="relative bg-white rounded-2xl shadow-2xl dark:bg-gray-800 border border-gray-100 dark:border-gray-700"
        >
          <div
            class="flex items-center justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-700 border-gray-100"
          >
            <h3
              id="title"
              class="text-lg font-bold text-gray-900 dark:text-white"
            ></h3>
            <button
              id="xclose"
              type="button"
              class="text-gray-400 bg-transparent hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl text-sm w-8 h-8 ms-auto inline-flex justify-center items-center cursor-pointer"
              data-modal-hide="crud-modal"
            >
              <svg
                class="w-3 h-3"
                aria-hidden="true"
                fill="none"
                viewBox="0 0 14 14"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="m1 1 6 6m0 0 7 7M7 7l7-7M7 7l-7 7"
                />
              </svg>
            </button>
          </div>

          <form class="p-4 md:p-5" id="formproduct">
            <div class="grid gap-4 mb-4 grid-cols-2"></div>
            <!-- Tem SP -->
            <div class="col-span-2 sm:col-span-1">
              <label
                for="txt_name"
                class="block mb-2 text-sm font-semibold text-gray-900 dark:text-white"
                >Tên sản phẩm</label
              >
              <input
                type="text"
                name="name"
                id="txt_name"
                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-[#2D99AE]/20 focus:border-[#2D99AE] block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
              />
              <span id="tb_name" class="text-red-700"></span>
            </div>
            <!-- hinh anh -->
            <div class="col-span-2">
              <label
                for="txt_img"
                class="block mb-2 text-sm font-semibold text-gray-900 dark:text-white"
                >Đường dẫn hình ảnh (URL)</label
              >
              <input
                type="text"
                name="img"
                id="txt_img"
                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-[#2D99AE]/20 focus:border-[#2D99AE] block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
              />
              <span id="tb_anh" class="text-red-700"></span>
            </div>
            <!-- Man Hinh -->
            <div class="col-span-2 sm:col-span-1">
              <label
                for="txt_screen"
                class="block mb-2 text-sm font-semibold text-gray-900 dark:text-white"
                >Màn hình</label
              >
              <input
                type="text"
                name="screen"
                id="txt_screen"
                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-[#2D99AE]/20 focus:border-[#2D99AE] block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
              />
              <span id="tb_manhinh" class="text-red-700"></span>
            </div>
            <!-- Cam truoc -->
            <div class="col-span-2 sm:col-span-1">
              <label
                for="txt_frcamera"
                class="block mb-2 text-sm font-semibold text-gray-900 dark:text-white"
                >Camera trước</label
              >
              <input
                type="text"
                name="frcam"
                id="txt_frcamera"
                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-[#2D99AE]/20 focus:border-[#2D99AE] block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
              />
              <span id="tb_camtruoc" class="text-red-700"></span>
            </div>
            <!-- Cam Sau -->
            <div class="col-span-2 sm:col-span-1">
              <label
                for="txt_bacamera"
                class="block mb-2 text-sm font-semibold text-gray-900 dark:text-white"
                >Camera sau</label
              >
              <input
                type="text"
                name="bacam"
                id="txt_bacamera"
                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-[#2D99AE]/20 focus:border-[#2D99AE] block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
              />
              <span id="tb_camsau" class="text-red-700"></span>
            </div>
            <!-- Giá Bán -->
            <div class="col-span-2 sm:col-span-1">
              <label
                for="txt_price"
                class="block mb-2 text-sm font-semibold text-gray-900 dark:text-white"
                >Giá bán (VNĐ)</label
              >
              <input
                type="number"
                name="price"
                id="txt_price"
                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-[#2D99AE]/20 focus:border-[#2D99AE] block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
              />
              <span id="tb_gia" class="text-red-700"></span>
            </div>
            <!-- Hãng SX -->
            <div class="col-span-2">
              <label
                for="txt_type"
                class="block mb-2 text-sm font-semibold text-gray-900 dark:text-white"
                >Hãng sản xuất</label
              >
              <select
                id="txt_type"
                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-xl focus:border-[#2D99AE] focus:ring-2 focus:ring-[#2D99AE]/20 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white cursor-pointer"
              >
                <option value="all" disabled selected>
                  -- Chọn hãng sản xuất --
                </option>
                <option value="samsung">Samsung</option>
                <option value="iphone">iPhone</option>
              </select>
              <span id="tb_type" class="text-red-700"></span>
            </div>
            <!-- Mô tả -->
            <div class="col-span-2">
              <label
                for="txt_desc"
                class="block mb-2 text-sm font-semibold text-gray-900 dark:text-white"
                >Mô tả sản phẩm</label
              >
              <textarea
                id="txt_desc"
                name="description"
                rows="3"
                class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-xl border border-gray-300 focus:ring-2 focus:ring-[#2D99AE]/20 focus:border-[#2D99AE] dark:bg-gray-700 dark:border-gray-600 dark:text-white"
              ></textarea>
              <span id="tb_desc" class="text-red-700"></span>
            </div>
            <div
              id="footbutton"
              class="flex items-center justify-end space-x-3 border-t border-gray-200 dark:border-gray-700 pt-4 mt-4"
            ></div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
    <script src="./../models/Manager.js" type="module"></script>
  </body>
</html>
