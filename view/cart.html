<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Cart</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-50 dark:bg-gray-950 min-h-screen text-gray-800 dark:text-gray-100">

  <div class="max-w-4xl mx-auto my-10 p-4">
    
    <div class="mb-6">
      <a href="../index.html" class="inline-flex items-center gap-2 text-sm font-medium text-[#2D99AE] hover:opacity-80 transition-opacity">
        <i class="fa-solid fa-arrow-left"></i> Tiếp tục mua sắm
      </a>
    </div>

    <div class="overflow-hidden bg-white dark:bg-gray-900 rounded-2xl border border-gray-100 dark:border-gray-800 shadow-xl">
      
      <div class="bg-slate-50 dark:bg-gray-800/50 px-6 py-5 border-b border-gray-100 dark:border-gray-800">
        <h1 class="text-xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
          <i class="fa-solid fa-cart-shopping text-[#2D99AE]"></i> Giỏ hàng của bạn
        </h1>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse whitespace-nowrap">
          <thead>
            <tr class="bg-[#2D99AE]/10 dark:bg-gray-800 text-slate-700 dark:text-gray-200 font-semibold text-sm tracking-wider border-b border-gray-100 dark:border-gray-800">
              <th class="py-4 px-6 text-center" colspan="2">Sản phẩm</th>
              <th class="py-4 px-6">Số lượng</th>
              <th class="py-4 px-6">Giá tiền</th>
              <th class="py-4 px-6">Tổng cộng</th>
              <th class="py-4 px-6 text-center" colspan="2">Hành động</th>
            </tr>
          </thead>

          <tbody id="displayCart" class="text-slate-600 dark:text-gray-300 text-sm divide-y divide-gray-100 dark:divide-gray-800">
            </tbody>
        </table>
      </div>

      <div class="p-6 bg-slate-50 dark:bg-gray-800/30 border-t border-gray-100 dark:border-gray-800 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div class="text-center sm:text-left">
          <span class="text-sm text-gray-500 dark:text-gray-400">Thành tiền (tạm tính):</span>
          <div class="text-2xl font-black text-gray-900 dark:text-white mt-1" id="totalCartPrice">0đ</div>
        </div>
        <button id="btnCheckout" class="w-full sm:w-auto bg-[#05C776] hover:bg-[#04b269] text-white font-semibold px-8 py-3 rounded-xl shadow-lg shadow-[#05C776]/20 transition-all active:scale-98 cursor-pointer flex items-center justify-center gap-2">
          <i class="fa-solid fa-credit-card"></i> Tiến hành thanh toán
        </button>
      </div>

    </div>
  </div>

  <script src="./../models/Cart.js" type="module"></script>
</body>
</html>
